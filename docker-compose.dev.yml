services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexion
      POSTGRES_USER: nexion
      POSTGRES_PASSWORD: nexion
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexion -d nexion']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "npm run db:generate && npm run db:migrate:deploy && npm run dev:docker",
      ]
    environment:
      DATABASE_URL: postgresql://nexion:nexion@db:5432/nexion
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_replace_me}
      CLERK_WEBHOOK_SIGNING_SECRET: ${CLERK_WEBHOOK_SIGNING_SECRET:-whsec_replace_me}
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  app_node_modules:
